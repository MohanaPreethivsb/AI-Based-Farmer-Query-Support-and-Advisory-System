spring.application.name=Farm Advisory API

# Server Configuration
server.port=${SERVER_PORT:5000}
server.servlet.context-path=/

# MongoDB Configuration
# MongoDB connection string MUST be provided via environment variable for secrets safety.
# Example: set `MONGODB_URI` in your environment or in a local `.env` file (not committed).
spring.data.mongodb.uri=${MONGODB_URI}
# Alternative configuration (if using standard connection):
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=farm_advisory
# spring.data.mongodb.username=
# spring.data.mongodb.password=

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:604800000}

# Free local farm advisory engine
# No paid AI API key is required.

# Weather API Configuration
weather.api-key=${WEATHER_API_KEY}

# Gmail SMTP Configuration
# Set MAIL_USERNAME to your Gmail address.
# Set MAIL_PASSWORD to a Gmail App Password, not your normal Gmail password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.email.dev-otp-fallback=true

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# File Upload Configuration
file.upload.max-size=10485760

# Logging
logging.level.root=INFO
logging.level.com.farmadvisory=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Spring Security
spring.security.filter.order=5

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
