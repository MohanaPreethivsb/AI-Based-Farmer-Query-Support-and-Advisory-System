spring.application.name=Farm Advisory API

# Server Configuration
server.port=${SERVER_PORT:5000}

# MongoDB Configuration (Production)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/farm_advisory}

# JWT Configuration
jwt.secret=${JWT_SECRET:change_me_in_production}
jwt.expiration=${JWT_EXPIRATION:604800000}

# Free local farm advisory engine
# No paid AI API key is required.

# Weather API Configuration
weather.api-key=${WEATHER_API_KEY:}

# Gmail SMTP Configuration
# Set MAIL_USERNAME to your Gmail address.
# Set MAIL_PASSWORD to a Gmail App Password, not your normal Gmail password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.email.dev-otp-fallback=false

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.root=WARN
logging.level.com.farmadvisory=INFO
